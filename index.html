<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Menú Digital</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ─── RESET & VARIABLES ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.15);
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --text: #f0ece4;
      --muted: #8a8680;
      --radius-card: 18px;
      --radius-pill: 999px;
      --font-headline: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
      --shadow: 0 8px 32px rgba(0,0,0,0.45);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 400;
      min-height: 100vh;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ─── COVER ─── */
    .cover {
      position: relative;
      width: 100%;
      height: 340px;
      overflow: hidden;
      background: #111;
    }
    .cover img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.55);
    }
    .cover-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1510 0%, #2a2015 50%, #1a1510 100%);
    }
    .cover-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(14,14,14,0.2) 0%, rgba(14,14,14,0.85) 100%);
    }
    .cover-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 28px 20px 24px;
    }
    .cover-logo {
      width: 54px; height: 54px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      overflow: hidden;
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .cover-logo img { width: 100%; height: 100%; object-fit: cover; }
    .cover-logo-placeholder {
      font-size: 22px;
      color: var(--accent);
    }
    .cover-title {
      font-family: var(--font-headline);
      font-size: 30px;
      font-weight: 700;
      line-height: 1.1;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .cover-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 5px;
      font-weight: 300;
    }

    /* ─── TOP CONTROLS (search + view toggle) ─── */
    .top-controls {
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      z-index: 60;
      pointer-events: none;
    }
    .ctrl-left, .ctrl-right {
      pointer-events: all;
      display: flex; align-items: center; gap: 8px;
    }

    .glass-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(14,14,14,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
      font-size: 16px;
      flex-shrink: 0;
    }
    .glass-btn:hover { background: rgba(200,169,110,0.2); border-color: var(--accent); }
    .glass-btn.active { background: var(--accent); color: #0e0e0e; border-color: var(--accent); }

    /* view toggle group */
    .view-toggle {
      display: flex;
      background: rgba(14,14,14,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 4px;
      gap: 2px;
    }
    .view-btn {
      width: 36px; height: 36px;
      border-radius: var(--radius-pill);
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
      font-size: 14px;
    }
    .view-btn.active { background: var(--text); color: var(--bg); }

    /* ─── SEARCH BAR ─── */
    .search-bar {
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      padding: 0 16px;
      z-index: 55;
      pointer-events: none;
      transition: var(--transition);
      opacity: 0;
      height: 0;
      overflow: hidden;
    }
    .search-bar.open {
      pointer-events: all;
      opacity: 1;
      height: auto;
      padding-top: 14px;
      padding-bottom: 10px;
    }
    .search-input-wrap {
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      display: flex; align-items: center;
      padding: 0 16px; gap: 10px;
      height: 48px;
    }
    .search-input-wrap svg { color: var(--muted); flex-shrink: 0; }
    .search-input-wrap input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 400;
    }
    .search-input-wrap input::placeholder { color: var(--muted); }
    .search-clear {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 14px;
      padding: 4px;
    }

    /* ─── MAIN ─── */
    .main-wrapper {
      max-width: 480px;
      margin: 0 auto;
    }

    /* ─── CATEGORY SECTION ─── */
    .category-section { margin-bottom: 36px; }

    .cat-header {
      position: relative;
      height: 120px;
      border-radius: var(--radius-card);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .cat-header-img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.45);
    }
    .cat-header-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%);
    }
    .cat-header-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(14,14,14,0.6) 0%, transparent 70%);
    }
    .cat-header-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .cat-header-label span {
      font-family: var(--font-headline);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      border-top: 1px solid rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding: 6px 20px;
    }

    /* ─── LIST VIEW ─── */
    .dish-list { display: flex; flex-direction: column; gap: 0; }
    .dish-list-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .dish-list-item:last-child { border-bottom: none; }
    .dish-list-item:active { opacity: 0.75; }

    .dish-thumb {
      width: 72px; height: 90px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .dish-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .dish-list-item:hover .dish-thumb img { transform: scale(1.06); }
    .dish-thumb-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      background: var(--surface2);
    }

    .dish-info { flex: 1; min-width: 0; }
    .dish-name-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
      margin-bottom: 4px;
    }
    .dish-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      font-family: var(--font-headline);
      flex: 1;
    }
    .dish-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      font-family: var(--font-headline);
    }
    .dish-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.5;
      font-weight: 300;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-top: 3px;
    }
    .dish-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; font-weight: 500;
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      line-height: 1;
    }
    .badge-popular { background: rgba(234,179,8,0.12); color: #eab308; }
    .badge-chef { background: rgba(200,169,110,0.12); color: var(--accent); }
    .badge-nuevo { background: rgba(99,102,241,0.12); color: #818cf8; }
    .badge-unavail { background: rgba(239,68,68,0.1); color: #f87171; }

    .no-image-tag {
      font-size: 10px; color: var(--muted);
      margin-top: 6px;
    }

    /* ─── GRID VIEW ─── */
    .dish-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .dish-card {
      background: var(--surface);
      border-radius: var(--radius-card);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid var(--border);
    }
    .dish-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .dish-card:active { transform: scale(0.97); }
    .dish-card-img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .dish-card-img-placeholder {
      width: 100%; aspect-ratio: 4/3;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .dish-card-body { padding: 11px 12px 13px; }
    .dish-card-name {
      font-family: var(--font-headline);
      font-size: 13.5px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 3px;
    }
    .dish-card-desc {
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .dish-card-price {
      font-family: var(--font-headline);
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    /* ─── CATEGORY NAV (bottom pill) ─── */
    .cat-nav-wrapper {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
      z-index: 50;
      pointer-events: none;
    }
    .cat-nav {
      pointer-events: all;
      background: rgba(14,14,14,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 6px;
      overflow-x: auto;
      gap: 2px;
    }
    .cat-nav-btn {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: var(--radius-pill);
      background: transparent;
      border: none;
      color: rgba(240,236,228,0.55);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .cat-nav-btn:hover { color: var(--text); }
    .cat-nav-btn.active {
      background: var(--text);
      color: var(--bg);
    }

    /* ─── CONTENT PADDING ─── */
    .content-area {
      padding: 0 16px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    /* ─── MODAL ─── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 480px;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      z-index: 101;
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
      max-height: 88vh;
      overflow-y: auto;
    }
    .modal.open { transform: translateX(-50%) translateY(0); }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .modal-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
    }
    .modal-img-placeholder {
      width: 100%; aspect-ratio: 3/2;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 64px;
    }
    .modal-body { padding: 20px 20px 32px; }
    .modal-title {
      font-family: var(--font-headline);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .modal-price {
      font-family: var(--font-headline);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .modal-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      font-weight: 300;
    }
    .modal-desc-adv {
      font-size: 13px;
      color: rgba(138,134,128,0.8);
      line-height: 1.6;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-weight: 300;
    }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ─── LOADING ─── */
    .loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 200;
      gap: 16px;
      transition: opacity 0.4s ease;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loader {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen p {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }

    /* ─── SVG ICONS (inline) ─── */
    .icon-svg { display: inline-block; }

    /* ─── UNAVAILABLE ─── */
    .dish-unavail { opacity: 0.45; }

    /* ─── PROMO BANNER ─── */
    .promo-banner {
      border-radius: var(--radius-card);
      overflow: hidden;
      margin-bottom: 28px;
    }
    .promo-banner img { width: 100%; display: block; }

    /* ─── FOOTER ─── */
    .menu-footer {
      text-align: center;
      padding: 0 20px 20px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 300;
    }
    .menu-footer a { color: var(--accent); text-decoration: none; }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    .category-section { animation: fadeUp 0.4s ease forwards; }

    /* ─── FILTER BAR (dietético) - oculto por defecto, extendible ─── */
    .filter-pill-row {
      display: flex; gap: 8px;
      overflow-x: auto; padding: 0 0 2px;
      margin-bottom: 16px;
    }
    .filter-pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }
    .filter-pill.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     PANTALLA DE CARGA
══════════════════════════════════════════════ -->
<div id="loading-screen" class="loading-screen">
  <div class="loader"></div>
  <p>Cargando menú…</p>
</div>

<!-- ══════════════════════════════════════════════
     CONTROLES SUPERIORES (fijos, sobre todo)
══════════════════════════════════════════════ -->
<div class="top-controls" id="top-controls">
  <!-- izquierda: toggle de vista -->
  <div class="ctrl-left">
    <div class="view-toggle">
      <button class="view-btn active" id="btn-list" onclick="setView('list')" title="Vista lista">
        <!-- list icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="5" width="7" height="14" rx="1.5" fill="currentColor"/>
          <line x1="13" y1="8" x2="21" y2="8"/>
          <line x1="13" y1="12" x2="21" y2="12"/>
          <line x1="13" y1="16" x2="19" y2="16"/>
        </svg>
      </button>
      <button class="view-btn" id="btn-grid" onclick="setView('grid')" title="Vista cuadrícula">
        <!-- grid icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="4" y="4" width="16" height="9" rx="2"/>
          <line x1="4" y1="17" x2="20" y2="17"/>
          <line x1="4" y1="20" x2="14" y2="20"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- derecha: buscador -->
  <div class="ctrl-right">
    <button class="glass-btn" id="search-toggle-btn" onclick="toggleSearch()" title="Buscar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     BARRA DE BÚSQUEDA DESPLEGABLE
══════════════════════════════════════════════ -->
<div class="search-bar" id="search-bar">
  <div class="search-input-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search-input" placeholder="Buscar platos…" oninput="handleSearch(this.value)">
    <button class="search-clear" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     CONTENIDO PRINCIPAL
══════════════════════════════════════════════ -->
<div class="main-wrapper" id="app" style="display:none;">

  <!-- PORTADA -->
  <div class="cover" id="cover-area">
    <div class="cover-placeholder" id="cover-bg"></div>
    <div class="cover-overlay"></div>
    <div class="cover-content">
      <div class="cover-logo" id="cover-logo">
        <span class="cover-logo-placeholder">🍽</span>
      </div>
      <h1 class="cover-title" id="cover-title">Cargando…</h1>
      <p class="cover-subtitle" id="cover-subtitle"></p>
    </div>
  </div>

  <!-- CONTENIDO SCROLLABLE -->
  <div class="content-area" id="content-area">
    <!-- promo banner (si existe) -->
    <div id="promo-zone" style="margin-top:20px;"></div>

    <!-- secciones de categoría -->
    <div id="dishes-container"></div>

    <!-- footer -->
    <div class="menu-footer" id="menu-footer" style="margin-top:24px;"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     NAV CATEGORÍAS (bottom)
══════════════════════════════════════════════ -->
<div class="cat-nav-wrapper" id="cat-nav-wrapper" style="display:none;">
  <nav class="cat-nav" id="cat-nav"></nav>
</div>

<!-- ══════════════════════════════════════════════
     MODAL DETALLE PLATO
══════════════════════════════════════════════ -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal()"></div>
<div class="modal" id="dish-modal">
  <div class="modal-handle"></div>
  <div id="modal-content"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   CONFIGURACIÓN — edita estas líneas
══════════════════════════════════════════════ */
const SUPABASE_URL  = 'https://TU_PROYECTO.supabase.co';  // ← cambia esto
const SUPABASE_KEY  = 'TU_ANON_KEY';                      // ← cambia esto
const SLUG          = 'sanjavier';                        // ← slug del restaurante

/* ══════════════════════════════════════════════
   ESTADO GLOBAL
══════════════════════════════════════════════ */
let restaurante  = null;
let categorias   = [];
let productos    = [];
let viewMode     = 'list';   // 'list' | 'grid'
let searchOpen   = false;
let searchTerm   = '';
let activeFilter = null;     // null = todos

/* ══════════════════════════════════════════════
   HELPERS SUPABASE
══════════════════════════════════════════════ */
async function sbFetch(path) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      Accept: 'application/json'
    }
  });
  if (!r.ok) throw new Error(`Supabase error: ${r.status}`);
  return r.json();
}

/* ══════════════════════════════════════════════
   CARGA DE DATOS
══════════════════════════════════════════════ */
async function loadMenu() {
  try {
    // Restaurante
    const rests = await sbFetch(`restaurantes?slug=eq.${SLUG}&select=*&limit=1`);
    if (!rests.length) throw new Error('Restaurante no encontrado');
    restaurante = rests[0];

    // Categorías ordenadas
    categorias = await sbFetch(
      `categorias?restaurante_id=eq.${restaurante.id}&select=*&order=orden.asc`
    );

    // Productos disponibles ordenados
    productos = await sbFetch(
      `productos?restaurante_id=eq.${restaurante.id}&disponible=eq.true&select=*&order=orden.asc`
    );

    renderAll();
  } catch (e) {
    console.error(e);
    document.getElementById('loading-screen').innerHTML = `
      <div style="text-align:center;padding:20px;color:#8a8680;">
        <div style="font-size:36px;margin-bottom:12px;">⚠️</div>
        <p style="font-size:14px;">No se pudo cargar el menú.<br>Verifica la configuración de Supabase.</p>
        <p style="font-size:11px;margin-top:8px;opacity:.6;">${e.message}</p>
      </div>`;
  }
}

/* ══════════════════════════════════════════════
   RENDER PRINCIPAL
══════════════════════════════════════════════ */
function renderAll() {
  renderCover();
  renderPromo();
  renderCatNav();
  renderDishes();
  document.getElementById('app').style.display = 'block';
  document.getElementById('cat-nav-wrapper').style.display = 'block';
  // ocultar loading
  const ls = document.getElementById('loading-screen');
  ls.classList.add('hidden');
  setTimeout(() => ls.remove(), 500);
}

/* ── PORTADA ── */
function renderCover() {
  document.getElementById('cover-title').textContent = restaurante.nombre;

  if (restaurante.atributos?.subtitulo) {
    document.getElementById('cover-subtitle').textContent = restaurante.atributos.subtitulo;
  }

  if (restaurante.fondo_url) {
    const bg = document.getElementById('cover-bg');
    bg.outerHTML = `<img src="${restaurante.fondo_url}" alt="Portada" id="cover-bg" style="width:100%;height:100%;object-fit:cover;filter:brightness(.55);">`;
  }

  if (restaurante.logo_url) {
    document.getElementById('cover-logo').innerHTML =
      `<img src="${restaurante.logo_url}" alt="Logo">`;
  }

  if (restaurante.color_primario) {
    document.documentElement.style.setProperty('--accent', restaurante.color_primario);
  }
}

/* ── PROMO ── */
function renderPromo() {
  if (restaurante.promo_activa && restaurante.promo_imagen_url) {
    document.getElementById('promo-zone').innerHTML =
      `<div class="promo-banner"><img src="${restaurante.promo_imagen_url}" alt="Promoción"></div>`;
  }
}

/* ── NAV CATEGORÍAS ── */
function renderCatNav() {
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = '';
  const todosBtn = makeNavBtn('Todos', null);
  todosBtn.classList.add('active');
  nav.appendChild(todosBtn);
  categorias.forEach(c => nav.appendChild(makeNavBtn(c.nombre, c.id)));
}

function makeNavBtn(label, catId) {
  const btn = document.createElement('button');
  btn.className = 'cat-nav-btn';
  btn.textContent = label;
  btn.onclick = () => scrollToCategory(catId, btn);
  return btn;
}

function scrollToCategory(catId, btn) {
  // highlight nav
  document.querySelectorAll('.cat-nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

  if (!catId) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  const el = document.getElementById(`cat-${catId}`);
  if (el) {
    const y = el.getBoundingClientRect().top + window.scrollY - 16;
    window.scrollTo({ top: y, behavior: 'smooth' });
  }
}

/* ── PLATOS ── */
function renderDishes() {
  const container = document.getElementById('dishes-container');
  container.innerHTML = '';

  const term = searchTerm.toLowerCase().trim();

  let productosVisibles = productos;
  if (term) {
    productosVisibles = productos.filter(p =>
      p.nombre.toLowerCase().includes(term) ||
      (p.descripcion && p.descripcion.toLowerCase().includes(term))
    );
  }

  if (term && !productosVisibles.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>Sin resultados para "<strong>${searchTerm}</strong>"</p>
      </div>`;
    return;
  }

  categorias.forEach((cat, idx) => {
    const prods = productosVisibles.filter(p => p.categoria_id === cat.id);
    if (!prods.length) return;

    const section = document.createElement('div');
    section.className = 'category-section';
    section.id = `cat-${cat.id}`;
    section.style.animationDelay = `${idx * 0.05}s`;

    // cabecera de categoría
    section.appendChild(makeCatHeader(cat));

    // items
    const listEl = document.createElement('div');
    listEl.className = viewMode === 'list' ? 'dish-list' : 'dish-grid';

    prods.forEach(p => {
      const el = viewMode === 'list' ? makeDishListItem(p, cat) : makeDishCard(p, cat);
      listEl.appendChild(el);
    });

    section.appendChild(listEl);
    container.appendChild(section);
  });
}

/* ── CABECERA CATEGORÍA ── */
function makeCatHeader(cat) {
  const div = document.createElement('div');
  div.className = 'cat-header';

  const emoji = cat.emoji || '';
  const label = emoji ? `${emoji} ${cat.nombre}` : cat.nombre;

  if (cat.atributos?.imagen_url) {
    div.innerHTML = `
      <img src="${cat.atributos.imagen_url}" alt="${cat.nombre}" class="cat-header-img">
      <div class="cat-header-overlay"></div>
      <div class="cat-header-label"><span>${label}</span></div>`;
  } else {
    div.innerHTML = `
      <div class="cat-header-placeholder"></div>
      <div class="cat-header-overlay"></div>
      <div class="cat-header-label"><span>${label}</span></div>`;
  }
  return div;
}

/* ── ÍTEM LISTA ── */
function makeDishListItem(p, cat) {
  const div = document.createElement('div');
  div.className = `dish-list-item${!p.disponible ? ' dish-unavail' : ''}`;
  div.onclick = () => openModal(p, cat);

  const sinFoto = cat.sin_fotos;
  let thumbHtml = '';

  if (!sinFoto) {
    if (p.imagen_url) {
      thumbHtml = `<div class="dish-thumb"><img src="${p.imagen_url}" alt="${p.nombre}" loading="lazy"></div>`;
    } else {
      const em = cat.emoji || '🍽';
      thumbHtml = `<div class="dish-thumb"><div class="dish-thumb-placeholder">${em}</div></div>`;
    }
  }

  const attrs  = p.atributos || {};
  let badgesHtml = '';
  if (attrs.popular)       badgesHtml += badge('popular',  '↗ Más popular');
  if (attrs.chef)          badgesHtml += badge('chef',     '🧑‍🍳 Chef');
  if (attrs.nuevo)         badgesHtml += badge('nuevo',    '✦ Nuevo');
  if (!p.disponible)       badgesHtml += badge('unavail',  'No disponible');
  if (badgesHtml) badgesHtml = `<div class="dish-tags">${badgesHtml}</div>`;

  div.innerHTML = `
    ${thumbHtml}
    <div class="dish-info">
      <div class="dish-name-row">
        <span class="dish-name">${p.nombre}</span>
        <span class="dish-price">${p.precio}</span>
      </div>
      ${p.descripcion ? `<p class="dish-desc">${p.descripcion}</p>` : ''}
      ${badgesHtml}
    </div>`;
  return div;
}

/* ── TARJETA GRID ── */
function makeDishCard(p, cat) {
  const div = document.createElement('div');
  div.className = `dish-card${!p.disponible ? ' dish-unavail' : ''}`;
  div.onclick = () => openModal(p, cat);

  const sinFoto = cat.sin_fotos;
  let imgHtml = '';
  if (!sinFoto) {
    if (p.imagen_url) {
      imgHtml = `<img src="${p.imagen_url}" alt="${p.nombre}" class="dish-card-img" loading="lazy">`;
    } else {
      const em = cat.emoji || '🍽';
      imgHtml = `<div class="dish-card-img-placeholder">${em}</div>`;
    }
  }

  const attrs = p.atributos || {};
  let topBadge = '';
  if (attrs.popular) topBadge = `<span style="position:absolute;top:8px;left:8px;" class="badge badge-popular">↗ Popular</span>`;
  else if (attrs.chef) topBadge = `<span style="position:absolute;top:8px;left:8px;" class="badge badge-chef">Chef</span>`;
  else if (attrs.nuevo) topBadge = `<span style="position:absolute;top:8px;left:8px;" class="badge badge-nuevo">✦ Nuevo</span>`;

  div.innerHTML = `
    <div style="position:relative;">
      ${imgHtml}
      ${topBadge}
    </div>
    <div class="dish-card-body">
      <div class="dish-card-name">${p.nombre}</div>
      ${p.descripcion ? `<div class="dish-card-desc">${p.descripcion}</div>` : ''}
      <div class="dish-card-price">${p.precio}</div>
    </div>`;
  return div;
}

function badge(type, text) {
  return `<span class="badge badge-${type}">${text}</span>`;
}

/* ══════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════ */
function openModal(p, cat) {
  const sinFoto = cat.sin_fotos;
  let imgHtml = '';
  if (!sinFoto) {
    if (p.imagen_url) {
      imgHtml = `<img src="${p.imagen_url}" alt="${p.nombre}" class="modal-img">`;
    } else {
      imgHtml = `<div class="modal-img-placeholder">${cat.emoji || '🍽'}</div>`;
    }
  }

  const attrs = p.atributos || {};
  let tagsHtml = '';
  if (attrs.popular) tagsHtml += badge('popular', '↗ Más popular');
  if (attrs.chef)    tagsHtml += badge('chef', '🧑‍🍳 Recomendación del chef');
  if (attrs.nuevo)   tagsHtml += badge('nuevo', '✦ Nuevo');
  if (tagsHtml)      tagsHtml = `<div class="modal-tags">${tagsHtml}</div>`;

  document.getElementById('modal-content').innerHTML = `
    ${imgHtml}
    <div class="modal-body">
      <div class="modal-title">${p.nombre}</div>
      <div class="modal-price">${p.precio}</div>
      ${p.descripcion ? `<p class="modal-desc">${p.descripcion}</p>` : ''}
      ${p.descripcion_avanzada ? `<p class="modal-desc-adv">${p.descripcion_avanzada}</p>` : ''}
      ${tagsHtml}
    </div>`;

  document.getElementById('modal-backdrop').classList.add('open');
  document.getElementById('dish-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.getElementById('dish-modal').classList.remove('open');
  document.body.style.overflow = '';
}

/* ══════════════════════════════════════════════
   CONTROLES: VISTA
══════════════════════════════════════════════ */
function setView(mode) {
  viewMode = mode;
  document.getElementById('btn-list').classList.toggle('active', mode === 'list');
  document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
  renderDishes();
}

/* ══════════════════════════════════════════════
   CONTROLES: BÚSQUEDA
══════════════════════════════════════════════ */
function toggleSearch() {
  searchOpen = !searchOpen;
  const bar = document.getElementById('search-bar');
  const btn = document.getElementById('search-toggle-btn');
  bar.classList.toggle('open', searchOpen);
  btn.classList.toggle('active', searchOpen);
  if (searchOpen) {
    setTimeout(() => document.getElementById('search-input').focus(), 100);
  } else {
    clearSearch();
  }
}

function handleSearch(val) {
  searchTerm = val;
  renderDishes();
}

function clearSearch() {
  searchTerm = '';
  document.getElementById('search-input').value = '';
  renderDishes();
}

/* ══════════════════════════════════════════════
   SCROLL → SYNC NAV
══════════════════════════════════════════════ */
function syncNavOnScroll() {
  const sections = document.querySelectorAll('.category-section[id^="cat-"]');
  let current = null;
  sections.forEach(s => {
    if (s.getBoundingClientRect().top < window.innerHeight * 0.4) {
      current = s.id.replace('cat-', '');
    }
  });
  if (current) {
    document.querySelectorAll('.cat-nav-btn').forEach(btn => {
      const isTodos = btn.textContent === 'Todos';
      const catId = categorias.find(c => c.nombre === btn.textContent)?.id;
      btn.classList.toggle('active', catId === current);
      if (isTodos) btn.classList.remove('active');
    });
  }
}

window.addEventListener('scroll', syncNavOnScroll, { passive: true });

/* ══════════════════════════════════════════════
   SWIPE DOWN MODAL (touch)
══════════════════════════════════════════════ */
let touchStartY = 0;
document.getElementById('dish-modal').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('dish-modal').addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 60) closeModal();
}, { passive: true });

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
loadMenu();
</script>
</body>
</html>
